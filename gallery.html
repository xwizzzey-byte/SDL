<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery | SDL Catering</title>

<style>
body{
  font-family:Arial,sans-serif;
  background:#f8f8f8;
  padding:40px;
  margin:0;
}

.back-link{
  display:inline-block;
  margin-bottom:30px;
  color:#b8860b;
  text-decoration:none;
  font-weight:bold;
}

h1{
  text-align:center;
  margin-bottom:15px;
  color:#b8860b;
}

.intro{
  text-align:center;
  max-width:700px;
  margin:0 auto 40px;
  color:#444;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:25px;
}

.gallery img{
  width:100%;
  height:350px;
  object-fit:cover;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,.15);
  transition:.3s ease;
}

.gallery img:hover{
  transform:scale(1.03);
}

@media(max-width:600px){
  body{
    padding:20px;
  }

  .gallery img{
    height:280px;
  }
}
</style>
</head>

<body>

<a class="back-link" href="/">← Back to Home</a>

<h1>SDL Catering Gallery</h1>

<p class="intro">
A selection of fresh fruit platters, cupcakes, desserts and catering displays prepared by SDL Catering.
</p>

  <img src="97C0B94A-7D09-490F-8617-1C43E0B917FD.jpg" alt="Fresh fruit bowl by SDL Catering">
  <img src="1617782D-A906-4861-BB1F-E94B1A7C0890.jpg" alt="Luxury chocolate cupcakes">
  <img src="61E701D7-71A2-41A2-A36A-05C2B32CEC49.jpg" alt="Daisy cupcakes by SDL Catering">

</html>
