<style>

body{

padding:40px;

}

h1{
text-align:center;
margin-bottom:40px;
color:#b8860b;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
}

.gallery img{
width:100%;
height:350px;
object-fit:cover;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.15);
transition:.3s;
}

.gallery img:hover{
transform:scale(1.03);
}

</style>

</head>
